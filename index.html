<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DocMind AI - Advanced document processing and analysis tools">
    <title>DocMind AI | Intelligent Document Processing</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em'
font-size='90'%3E%F0%9F%92%AB%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="scripts.js" defer></script>
    <script src="handlebars.min.js"></script>
    <script src="marked.js" defer></script>
    <script src="highlight.min.js" defer></script>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li>
                <span class="logo-icon">🏥</span>
                <strong class="logo-text">
                    <span class="logo-text-first">DocMind</span>
                    <span class="logo-text-second">AI</span>
                </strong>
            </li>
        </ul>
        <ul class="menu">
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Products</a></li>
            <li>
                <button id="themeToggle" class="outline" aria-label="Toggle theme" onclick="toggleTheme()">🌙</button>
            </li>
        </ul>
    </nav>

    <header class="container">
        <hgroup>
            <h1 class="page-title" id="pageTitle">Welcome to DocMind AI</h1>
            <p class="page-subtitle" id="pageSubtitle">Intelligent Document Processing</p>
        </hgroup>
        <select id="toolSelect">
            <option selected disabled value="">Home</option>
        </select>
    </header>

    <!-- Main Content Area -->
    <main class="container view-container">

        <!-- Home View -->
        <section class="view home-view active-view">
            <article class="hero-section">
                <main class="hero-content">
                    <hgroup>
                        <h2 class="hero-title">Intelligent Document Processing</h2>
                        <p class="hero-subtitle">Transform your documents with AI-powered analysis and extraction tools</p>
                    </hgroup>
                    <aside class="hero-illustration">
                        <div class="illustration-content">📄🔍🤖</div>
                    </aside>
                    <div class="hero-actions">
                        <button class="primary" id="getStartedBtn">Get Started</button>
                        <button class="secondary" id="learnMoreBtn">Learn More</button>
                    </div>
                </main>
            </article>

            <div class="grid" id="categoriesGrid">
                <!-- Category cards will be populated by JavaScript -->
            </div>
        </section>

        <!-- Results View -->
        <section class="view results-view" style="display: none;">
            <article id="resultsArea">
                <hgroup>
                    <h2 id="resultsTitle"></h2>
                    <p id="resultsSubtitle"></p>
                </hgroup>
                <main id="resultsContent">
                    <!-- Results will be displayed here -->
                </main>
                <footer class="grid">
                    <button class="primary" id="copyResultsBtn">Copy Results</button>
                    <button class="primary" id="downloadResultsBtn">Download</button>
                    <button class="secondary" id="showFormBtn">Show Form</button>
                </footer>
            </article>
        </section>

        <!-- Form View -->
        <section class="view form-view" style="display: none;">
            <article id="toolForm">
                <hgroup>
                    <h2 id="formTitle"></h2>
                    <p id="formSubtitle"></p>
                </hgroup>
                <form id="apiForm">
                    <input type="hidden" name="tool" id="toolId">
                    <fieldset class="form-fields" id="formFields">
                        <!-- Will be populated by JavaScript -->
                    </fieldset>
                </form>
                <footer class="grid">
                    <button type="submit" form="apiForm" class="primary" id="submitBtn">
                        <span class="btn-text">Submit</span>
                        <span class="btn-loading" style="display: none;">
                            <span class="loading-spinner"></span>
                            Processing...
                        </span>
                    </button>
                    <button type="button" class="secondary" id="cancelBtn">Cancel</button>
                </footer>
            </article>
        </section>

        <!-- History View -->
        <section class="view history-view">
            <div class="history-container">
                <div class="history-header">
                    <h2 class="history-title">Analysis History</h2>
                    <button class="btn btn-secondary btn-small" id="clearHistoryBtn">Clear History</button>
                </div>
                <div class="history-list">
                    <!-- History items will be displayed here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Notifications -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Templates -->
    <template id="errorTemplate">
        <div class="notification error-notification">
            <div class="notification-icon">⚠️</div>
            <div class="notification-content">
                <strong>Error:</strong>
                <div class="error-message"></div>
            </div>
            <button class="notification-close">×</button>
        </div>
    </template>

    <template id="categoryCardTemplate">
        <article class="category-card">
            <div class="category-icon"></div>
            <h4 class="category-title"></h4>
            <p class="category-description"></p>
        </article>
    </template>

    <template id="loadingTemplate">
        <div class="loading-overlay">
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <div class="loading-text">Processing your request...</div>
            </div>
        </div>
    </template>

    <template id="historyEmptyTemplate">
        <div class="history-empty-state">
            <div class="empty-state-icon">📄</div>
            <h3 class="empty-state-title">No history yet</h3>
            <p class="empty-state-description">Your analysis history will appear here</p>
        </div>
    </template>

    <!-- Tools View Template -->
    <template id="toolsViewTemplate">
        <section class="view tools-view">
            <hgroup class="tools-header">
                <h2 class="tools-title" id="topTitle">🔧 AI Tools</h2>
                <p class="tools-subtitle" id="topDescription">Select a tool to process your documents</p>
            </hgroup>

            <!-- Tools Grid -->
            <div class="tools-grid" id="toolsGrid">
                <!-- Will be populated by JavaScript -->
            </div>
        </section>
    </template>

    <template id="toolCardTemplate">
        <div class="tool-card">
            <div class="tool-card-header">
                <div class="tool-icon"></div>
                <div class="tool-category-badge"></div>
            </div>
            <div class="tool-card-content">
                <h3 class="tool-title"></h3>
                <p class="tool-description"></p>
            </div>
            <div class="tool-card-footer">
                <button class="btn btn-small tool-select-btn">Select Tool</button>
            </div>
        </div>
    </template>

    <template id="formFieldTemplate">
        <div class="form-group">
            <label class="form-label"></label>
            <div class="form-control-container"></div>
            <div class="form-help-text"></div>
        </div>
    </template>

    <template id="resultTemplate">
        <div class="result-card">
            <div class="result-header">
                <h3 class="result-title"></h3>
                <div class="result-meta"></div>
            </div>
            <div class="result-content"></div>
            <div class="result-footer">
                <div class="result-actions"></div>
            </div>
        </div>
    </template>
</body>
</html>
