; configuration file for docmind ai
; 
; important: this file should be renamed to config.ini and placed in the same directory
; as the application files. do not commit config.ini to version control as it may contain
; sensitive information.
; 
; @author costin stroie <costinstroie@eridu.eu.org>
; @license gpl 3
; 
; ai api configuration
; 
[llm]
provider = ollama
default_text_model = qwen2.5:1.5b
default_vision_model = gemma3:4b

[chat]
chat_history_length = 10

[security]
debug_mode = false
allowed_origins = *

[upload]
max_file_size = 10485760
allowed_file_types = image/jpeg, image/png, image/gif, image/webp, application/pdf, text/plain, text/markdown, application/msword, application/vnd.openxmlformats-officedocument.wordprocessingml.document, application/vnd.oasis.opendocument.text

[provider.openai]
endpoint = https://api.openai.com/v1
key = 
filter = /./

[provider.ollama]
endpoint = http://localhost:11434/v1
key = ollama
filter = /./

[provider.local]
endpoint = http://localhost:8000/v1
key = 
filter = /./

[provider.openrouter]
endpoint = https://openrouter.ai/api/v1
key = 
filter = /free/

[provider.cerebras]
endpoint = https://api.cerebras.ai/v1
key = 
filter = /./

[provider.together]
endpoint = https://api.together.xyz/v1
key = 
filter = /./