<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocMind AI</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%A5%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="vs.min.css">
    <script src="scripts.js"></script>
    <script src="highlight.min.js"></script>
</head>
<body>
    <div class="container">
        <hgroup>
            <h1 id="topTitle">🏥 DocMind AI</h1>
            <p id="topDescription">A collection of specialized tools designed to process, analyze, and extract key information from various documents using artificial intelligence.</p>
        </hgroup>

        <main>
            <section class="profile-selector">
                <h2>Available Profiles</h2>
                <div class="profile-select-container">
                    <label for="profileSelect">Select a Profile:</label>
                    <select id="profileSelect" class="form-control">
                        <option value="">-- Select a profile --</option>
                        <!-- Will be populated by JavaScript -->
                    </select>
                </div>
                <div id="profilesGrid">
                    <!-- Will be populated by JavaScript -->
                </div>
            </section>

            <article class="results-area" id="resultsArea" style="display: none;">
                <hgroup>
                    <h1>📝 Results</h1>
                    <p>Review the AI-generated results below. You can copy the content or download it as a file.</p>
                </hgroup>
                <main id="resultsContent"></main>
            </article>

            <section class="profile-form" id="profileForm" style="display: none;">
                <form id="apiForm">
                    <input type="hidden" name="action" id="actionInput">
                    <fieldset id="formFields">
                        <!-- Will be populated by JavaScript -->
                    </fieldset>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
                </form>
            </section>
        </main>
    </div>

    <!-- Error Template -->
    <template id="errorTemplate">
        <section role="alert" class="error">
            <strong>⚠️ Error:</strong>
            <div class="error-message"></div>
        </section>
    </template>

    <!-- Loading Template -->
    <template id="loadingTemplate">
        <div class="loading-indicator">
            <span class="loading"></span>
            <span class="loading-text">Processing...</span>
        </div>
    </template>

    <!-- Profile Card Template -->
    <template id="profileCardTemplate">
        <a class="tool-card" href="#">
            <div class="tool-icon"></div>
            <h3></h3>
            <p></p>
        </a>
    </template>

    <!-- Form Field Template -->
    <template id="formFieldTemplate">
        <div class="form-field">
            <label></label>
            <div class="field-input"></div>
        </div>
    </template>

    <!-- Result Template -->
    <template id="resultTemplate">
        <article>
            <header>
                <h2>Results</h2>
            </header>
            <div class="result-content"></div>
        </article>
    </template>

</body>
</html>
